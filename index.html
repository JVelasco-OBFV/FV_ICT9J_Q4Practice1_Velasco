<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4Practice1</title>
</head>
<body>
    <h1>JavaScript Conditional Statements</h1>
    <!--start of lecture-->
    <h2>Check Age classification</h2>
    <input type="number" class="form-control" id="age">
    <br>
    <button class="btn btn-info" onclick="checkAge()">Check Age</button>

    <script>
        function checkAge() {
            const age = document.getElementById('age').value;
            if (isNaN(age) || age < 0) {
                alert(`Please input a valid number.`);
                console.error(`invalid`);
            }
            else if (age < 18) {
                alert(`You are now ` + age + ` years old; underage`);
                console.log(`is working...`);
            }
            else if (age >= 18) {
                alert(`You are of legal age`);
                console.log(`is working... like literally`);
            }
            else {
                console.log(`How are you alive?`)
            }

        }
    </script>
</body>
</html>
